name: Build and Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            arch: x64
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            arch: arm64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'LYS Refiner ${{ github.ref_name }}'
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Copy standalone exe
        shell: pwsh
        run: |
          $exe = "src-tauri/target/${{ matrix.target }}/release/lys-refiner.exe"
          $dest = "src-tauri/target/${{ matrix.target }}/release/LYS.Refiner_${{ github.ref_name }}_${{ matrix.arch }}-standalone.exe"
          Copy-Item $exe $dest

      - name: Upload standalone to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.target }}/release/LYS.Refiner_${{ github.ref_name }}_${{ matrix.arch }}-standalone.exe
